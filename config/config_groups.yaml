## Clash/Mihomo Config
## Converted from Rules.ini (Subconverter format) to Mihomo YAML

.VARIABLES:
  - &SPEEDTEST_IV 300      # 5 minutes
  - &UPDATE_IV 86400       # 24 hours
  - &TOLERANCE 50          # ms


## Subscription Provider
proxy-providers:
  provider_1:
    type: http
    url: ""  # 替换为你的订阅链接
    proxy: DIRECT
    interval: *UPDATE_IV
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: *SPEEDTEST_IV


## Global Settings
mixed-port: 7890
allow-lan: true
bind-address: "*"
unified-delay: false
tcp-concurrent: true
mode: rule
log-level: info
ipv6: false
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

geo-auto-update: false
geo-update-interval: 24

external-controller: 0.0.0.0:9090


## DNS Settings
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
  default-nameserver:
    - 114.114.114.114
    - 8.8.8.8
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query


## Proxy Groups
proxy-groups:

  # --- 功能组 ---
  - name: 🚀 分组选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔯 故障转移
      - 👀 手动选择
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点

  - name: 👀 手动选择
    type: select
    include-all: true

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    filter: "(?i)香港|中港|中国-香港|hong"
    url: https://www.gstatic.com/generate_204
    interval: *SPEEDTEST_IV
    tolerance: *TOLERANCE

  - name: 🔯 故障转移
    type: fallback
    include-all: true
    filter: "(?i)日本|沪日|japan|美国|美国高级|美国实验性|united"
